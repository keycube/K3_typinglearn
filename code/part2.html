<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
		<title>Partie 2 - Mots</title>
		<link rel="stylesheet" href="style/style1.css">
	</head>
	<body>

		<div class="header">

			<!-- Partie + exercices -->
			<div class="section">
				<div class="title">Partie 2 - Mots</div>
				<div class="exercises">
					<span id="ex1">3-4 lettres</span>
					<span id="ex2">5-6 lettres</span>
					<span id="ex3">7-8 lettres</span>
					<span id="ex4">9 lettres</span>
				</div>
			</div>

			<!-- Timer -->
			<div class="timer" id="timer">00:00</div>

			<!-- Progression -->
			<div class="progress-container">
				<div id="progressPercent">0%</div>
				<div class="progress-bar">
					<div class="progress-fill" id="progressBar"></div>
				</div>
			</div>

			<!-- Nom utilisateur -->
			<div class="username" id="usernameDisplay"></div>

		</div>

		<div class="main">
			<div class="text-display" id="textDisplay"></div>
		</div>

		<script src="script/script2.js"></script>
	</body>
</html>
